<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AquaSort Master Gold</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div id="level-num">LEVEL 12</div>
        <div class="actions">
            <button class="icon-btn" onclick="undo()">↩️ Undo</button>
            <button class="icon-btn" onclick="resetLevel()">🔄</button>
        </div>
    </div>
    
    <div id="game-container"></div>

    <div id="win-screen" class="overlay">
        <div class="congrats-box">
            <h2>EXCELLENT!</h2>
            <p>Brain Training Complete</p>
            <button onclick="nextLevel()">PLAY NEXT LEVEL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
