<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AquaSort Master Gold</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="pour-sound" src="https://actions.google.com/sounds/v1/water/water_splash.ogg" preload="auto"></audio>
    <audio id="win-sound" src="https://actions.google.com/sounds/v1/cartoon/clime_up_reverb.ogg" preload="auto"></audio>

    <div class="game-ui">
        <div class="header">
            <div id="level-display">LEVEL 1</div>
            <div class="controls">
                <button class="ui-btn" onclick="undo()">↩️ UNDO</button>
                <button class="ui-btn" onclick="resetLevel()">🔄 RESET</button>
            </div>
        </div>

        <div id="game-board"></div>

        <div id="win-modal" class="modal">
            <div class="modal-content">
                <div class="stars">✨✨✨</div>
                <h2>EXCELLENT!</h2>
                <button class="next-btn" onclick="nextLevel()">NEXT LEVEL</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
