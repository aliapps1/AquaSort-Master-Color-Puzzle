<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Water Sort: Infinite Gold</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <div class="start-content">
            <h1>WATER SORT</h1>
            <p>Premium Offline Experience</p>
            <button id="start-btn" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div class="game-ui" style="display: none;">
        <div class="header">
            <div id="level-tag">LEVEL <span id="level-number">1</span></div>
            <div class="top-actions">
                <button class="icon-btn" onclick="undo()">↩️</button>
                <button class="icon-btn" onclick="resetLevel()">🔄</button>
            </div>
        </div>
        <div id="game-board"></div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-box">
            <div class="icon">🏆</div>
            <h2>AWESOME!</h2>
            <button class="next-btn" onclick="nextLevel()">NEXT LEVEL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
