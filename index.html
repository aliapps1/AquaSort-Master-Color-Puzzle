<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AquaSort Master: 1000+ Levels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="pour-sound" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3" preload="auto"></audio>
    <audio id="win-sound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

    <div class="game-ui">
        <div class="header">
            <div id="level-display">LEVEL 1</div>
            <div class="controls">
                <button class="ui-btn" onclick="undo()">↩️ UNDO</button>
                <button class="ui-btn" onclick="resetLevel()">🔄 RESET</button>
            </div>
        </div>

        <div id="game-board"></div>

        <div id="win-modal" class="modal">
            <div class="modal-content">
                <div class="trophy">🏆</div>
                <h2>LEVEL COMPLETE!</h2>
                <p>Ready for more challenge?</p>
                <button class="next-btn" onclick="nextLevel()">NEXT LEVEL</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
