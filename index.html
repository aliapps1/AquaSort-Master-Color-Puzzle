<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AquaSort Master: Infinite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <div class="start-content">
            <h1>AQUA SORT</h1>
            <p>Infinite Challenges & Auto-Save</p>
            <button id="start-btn" onclick="startGame()">START ADVENTURE</button>
        </div>
    </div>

    <div class="game-ui" style="display: none;">
        <div class="header">
            <div id="level-tag">LEVEL <span id="level-number">1</span></div>
            <div class="top-actions">
                <button class="icon-btn" onclick="undo()">↩️</button>
                <button class="icon-btn" onclick="resetLevel()">🔄</button>
            </div>
        </div>
        <div id="game-board"></div>
        <div id="win-modal" class="modal">
            <div class="modal-box">
                <div class="icon">✨</div>
                <h2>UNSTOPPABLE!</h2>
                <button class="next-btn" onclick="nextLevel()">NEXT CHALLENGE</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
